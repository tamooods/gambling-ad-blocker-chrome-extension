<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        width: 260px;
        font-family: -apple-system, "Segoe UI", "Noto Sans Thai", sans-serif;
        padding: 16px;
        background: #12141c;
        color: #f0f0f5;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 4px;
      }
      p.sub {
        font-size: 12px;
        color: #9a9ab0;
        margin: 0 0 14px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-top: 1px solid #262838;
      }
      .switch {
        position: relative;
        width: 42px;
        height: 24px;
      }
      .switch input {
        display: none;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #3a3c50;
        border-radius: 24px;
        cursor: pointer;
        transition: 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        top: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider {
        background: #ff4d4f;
      }
      input:checked + .slider::before {
        transform: translateX(18px);
      }
      .stat {
        font-size: 13px;
      }
      .stat b {
        font-size: 20px;
        color: #ff4d4f;
        display: block;
      }
      button {
        width: 100%;
        margin-top: 12px;
        padding: 8px;
        background: #262838;
        color: #f0f0f5;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
      }
      button:hover {
        background: #333650;
      }
    </style>
  </head>
  <body>
    <h1>🚫 Gambling Ad Blocker</h1>
    <p class="sub">บล็อกโฆษณาเว็บพนันออนไลน์อัตโนมัติ</p>

    <div class="row">
      <span>เปิดใช้งาน</span>
      <label class="switch">
        <input type="checkbox" id="toggle" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <span class="stat">บล็อกแล้วทั้งหมด<b id="count">0</b></span>
    </div>

    <button id="reload">รีโหลดหน้าเว็บนี้</button>

    <script src="popup.js"></script>
  </body>
</html>
